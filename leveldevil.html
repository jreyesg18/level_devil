<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Devil</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
        canvas {
            border: 1px solid white;
        }
        #gameOverScreen, #levelCompleteScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
        }
        #gameOverScreen {
            color: red;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="gameOverScreen">
        GAME OVER
        <button onclick="restartGame()">Reiniciar</button>
    </div>
    <div id="levelCompleteScreen">
        Nivel Completado
        <button onclick="restartGame()">Reiniciar</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const player = {
            x: 50,
            y: 410, // Updated initial position
            width: 28,
            height: 28,
            velocityX: 0,
            velocityY: 0,
            onGround: true
        };

        const platforms = [
            { x: 150, y: 300, width: 100, height: 20 },
            { x: 550, y: 200, width: 100, height: 20 }
        ];

        const door = {
            x: canvas.width - 60,
            y: 372,
            width: 30,
            height: 50
        };

        const gravity = 0.5;
        const jumpStrength = -12;
        const moveSpeed = 4;

        function drawPlayer() {
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = 'black';
            ctx.fillRect(player.x + 8, player.y + 8, 3, 3);
            ctx.fillRect(player.x + 17, player.y + 8, 3, 3);
        }

        function drawPlatforms() {
            platforms.forEach(platform => {
                ctx.fillStyle = '#555555';
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                ctx.strokeRect(platform.x, platform.y, platform.width, platform.height);
            });
        }

        function drawDoor() {
            ctx.fillStyle = '#00cc66';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1;
            ctx.fillRect(door.x, door.y, door.width, door.height);
            ctx.strokeRect(door.x, door.y, door.width, door.height);
        }

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        function updatePlayer() {
            player.velocityY += gravity;
            player.x += player.velocityX;
            player.y += player.velocityY;

            if (player.y + player.height >= 446) { // Updated to check against the invisible floor line
                player.y = 410; // Updated to place player on the invisible floor line
                player.onGround = true;
                player.velocityY = 0;
            }

            platforms.forEach(platform => {
                if (checkCollision(player, platform)) {
                    if (player.velocityY > 0 && player.y + player.height <= platform.y) {
                        player.y = platform.y - player.height; // Corrected to place player above the platform
                        player.onGround = true;
                        player.velocityY = 0;
                    } else if (player.velocityY < 0 && player.y >= platform.y + platform.height) {
                        player.y = platform.y + platform.height;
                        player.velocityY = 0;
                    }
                }
            });

            if (checkCollision(player, door)) {
                showLevelCompleteScreen();
            }

            if (player.x < 0) {
                player.x = 0;
            } else if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }

            if (player.y > canvas.height) {
                showGameOverScreen();
            }
        }

        function draw() {
            ctx.fillStyle = '#1a1a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawPlayer();
            drawPlatforms();
            drawDoor();

            // Draw invisible floor line
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, 446);
            ctx.lineTo(canvas.width, 446);
            ctx.stroke();
        }

        function gameLoop() {
            updatePlayer();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function showGameOverScreen() {
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('levelCompleteScreen').style.display = 'none';
        }

        function showLevelCompleteScreen() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('levelCompleteScreen').style.display = 'flex';
        }

        function restartGame() {
            player.x = 50;
            player.y = 410; // Reset to correct initial position
            player.velocityX = 0;
            player.velocityY = 0;
            player.onGround = true;
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('levelCompleteScreen').style.display = 'none';
        }

        function handleKeyDown(event) {
            if (event.key === 'ArrowLeft' || event.key === 'a') {
                player.velocityX = -moveSpeed;
            } else if (event.key === 'ArrowRight' || event.key === 'd') {
                player.velocityX = moveSpeed;
            } else if ((event.key === 'ArrowUp' || event.key === 'w' || event.key === ' ') && player.onGround) {
                player.velocityY = jumpStrength;
                player.onGround = false;
            }
        }

        function handleKeyUp(event) {
            if (event.key === 'ArrowLeft' || event.key === 'a') {
                player.velocityX = 0;
            } else if (event.key === 'ArrowRight' || event.key === 'd') {
                player.velocityX = 0;
            }
        }

        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);

        gameLoop();
    </script>
</body>
</html>
